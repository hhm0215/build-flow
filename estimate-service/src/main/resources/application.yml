server:
  port: 8082

spring:
  application:
    name: estimate-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/buildflow_estimate?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: estimate-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.buildflow.*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

claude:
  api:
    key: ${CLAUDE_API_KEY}
    model: claude-sonnet-4-6
    url: https://api.anthropic.com/v1/messages

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.buildflow.estimate: INFO
