server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - RewritePath=/api/v1/auth/(?<segment>.*), /api/v1/auth/${segment}

        - id: estimate-service
          uri: lb://estimate-service
          predicates:
            - Path=/api/v1/estimates/**
          filters:
            - AuthorizationHeaderFilter

        - id: site-service
          uri: lb://site-service
          predicates:
            - Path=/api/v1/sites/**
          filters:
            - AuthorizationHeaderFilter

        - id: purchase-service
          uri: lb://purchase-service
          predicates:
            - Path=/api/v1/purchases/**
          filters:
            - AuthorizationHeaderFilter

        - id: tax-service
          uri: lb://tax-service
          predicates:
            - Path=/api/v1/taxes/**
          filters:
            - AuthorizationHeaderFilter

        - id: site-service-clients
          uri: lb://site-service
          predicates:
            - Path=/api/v1/clients/**
          filters:
            - AuthorizationHeaderFilter

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - AuthorizationHeaderFilter

        - id: notification-service-warranties
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/warranties/**
          filters:
            - AuthorizationHeaderFilter

    config:
      uri: http://localhost:8888

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
