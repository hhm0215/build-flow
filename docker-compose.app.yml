version: '3.8'

# Spring Boot 서비스 전체 구성
# 사용법:
#   전체 스택: docker compose -f docker-compose.yml -f docker-compose.app.yml up -d
#   단일 서비스 재빌드: docker compose -f docker-compose.yml -f docker-compose.app.yml up -d --build auth-service

services:
  # ─────────────────────────────────────────
  # 1. Eureka Server (서비스 디스커버리)
  # ─────────────────────────────────────────
  eureka-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: eureka-server
    container_name: buildflow-eureka
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - buildflow-net

  # ─────────────────────────────────────────
  # 2. Config Server (중앙 설정)
  # ─────────────────────────────────────────
  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: config-server
    container_name: buildflow-config
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - buildflow-net

  # ─────────────────────────────────────────
  # 3. Gateway Server (API Gateway)
  # ─────────────────────────────────────────
  gateway-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway-server
    container_name: buildflow-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - buildflow-net

  # ─────────────────────────────────────────
  # 4. Auth Service
  # ─────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    container_name: buildflow-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      DB_HOST: mysql
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - buildflow-net

  # ─────────────────────────────────────────
  # 5. Estimate Service
  # ─────────────────────────────────────────
  estimate-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: estimate-service
    container_name: buildflow-estimate
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      DB_HOST: mysql
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - buildflow-net

  # ─────────────────────────────────────────
  # 6. Site Service
  # ─────────────────────────────────────────
  site-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: site-service
    container_name: buildflow-site
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      DB_HOST: mysql
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - buildflow-net

  # ─────────────────────────────────────────
  # 7. Purchase Service
  # ─────────────────────────────────────────
  purchase-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: purchase-service
    container_name: buildflow-purchase
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      DB_HOST: mysql
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - buildflow-net

  # ─────────────────────────────────────────
  # 8. Tax Service
  # ─────────────────────────────────────────
  tax-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: tax-service
    container_name: buildflow-tax
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      DB_HOST: mysql
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - buildflow-net

  # ─────────────────────────────────────────
  # 9. Notification Service
  # ─────────────────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    container_name: buildflow-notification
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - buildflow-net

  # ─────────────────────────────────────────
  # 10. Frontend (React + Nginx)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: buildflow-frontend
    ports:
      - "3000:80"
    depends_on:
      gateway-server:
        condition: service_healthy
    networks:
      - buildflow-net

networks:
  buildflow-net:
    external: true
    name: buildflow-net
